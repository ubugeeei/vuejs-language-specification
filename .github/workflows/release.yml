name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up VITE+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Verify repository
        run: vp run check

      - name: Verify release manifest is current
        run: |
          vp run generate:release-manifest
          git diff --exit-code provenance/releases/current.json

      - name: Build canonical corpus archive
        run: vp run release:archive

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes="Canonical Vue.js language specification and immediately vendorable conformance test-suite corpus."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber
          else
            gh release create "$tag" dist/release/* --verify-tag --title "$tag" --notes "$notes"
          fi
